<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice AI Pipeline — שיחות לייב</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f6fb;
      color: #1f2a44;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      direction: rtl;
      text-align: right;
    }

    /* ── Header ─────────────────────────────── */
    .top-header {
      background: linear-gradient(90deg, #4778ff 0%, #7b3ff1 100%);
      border-bottom: none;
      padding: 0 28px;
      height: 74px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 16px 34px rgba(87, 76, 205, 0.26);
    }
    .logo { font-size: 18px; font-weight: 700; color: #ffffff; }
    .nav-links { display: flex; gap: 2px; margin-inline-start: 12px; }
    .nav-link {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      color: #e8ebff;
      transition: all .15s;
    }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,.2); color: #ffffff; }
    .header-right { margin-inline-start: auto; display: flex; align-items: center; gap: 14px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; animation: pulse 1.6s infinite; }
    .live-label { font-size: 12px; color: #e8ebff; }
    #last-updated { font-size: 11px; color: #dbe0ff; }

    /* ── Layout ─────────────────────────────── */
    .app { display: flex; flex: 1; height: calc(100vh - 74px); overflow: hidden; }

    /* ── Left panel: setup ───────────────────── */
    .setup-panel {
      width: 300px;
      min-width: 300px;
      background: #ffffff;
      border-right: 1px solid #e6eaf4;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-title {
      padding: 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7a859f;
      border-bottom: 1px solid #e6eaf4;
    }
    .setup-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    label { font-size: 12px; color: #6f7892; margin-bottom: 4px; display: block; }
    select, input[type=text] {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e6eaf4;
      color: #1f2a44;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #4f6bff; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all .15s;
    }
    .btn-primary { background: #4f6bff; color: #ffffff; }
    .btn-primary:hover:not(:disabled) { background: #4158e8; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #f87171; }
    .btn:disabled { opacity: .4; cursor: default; }

    /* ── State card ─────────────────────────── */
    .state-card {
      margin: 0 16px 8px;
      background: #f9faff;
      border: 1px solid #e6eaf4;
      border-radius: 10px;
      padding: 12px;
    }
    .state-card .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .state-card .row:last-child { margin-bottom: 0; }
    .state-card .key { font-size: 11px; color: #7a859f; }
    .state-card .val { font-size: 12px; font-weight: 600; }
    .badge {
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .badge-asking    { background: #1e40af33; color: #93c5fd; }
    .badge-waiting   { background: #166534aa; color: #86efac; }
    .badge-repeating { background: #92400e44; color: #fcd34d; }
    .badge-rephrasing{ background: #6d28d944; color: #c4b5fd; }
    .badge-confirming{ background: #b45309aa; color: #fde68a; }
    .badge-fallback  { background: #7f1d1d44; color: #fca5a5; }
    .badge-done      { background: #14532d44; color: #4ade80; }
    .badge-error     { background: #7f1d1d88; color: #f87171; }
    .badge-greeting  { background: #eef2ff; color: #6f7892; }

    /* ── Answers ─────────────────────────────── */
    .answers-box { margin: 0 16px 16px; }
    .answers-box .a-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #7a859f; margin-bottom: 8px; }
    .answer-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 12px; }
    .answer-row .a-key { color: #7a859f; flex: 1; }
    .answer-row .a-val { color: #4ade80; font-weight: 600; }

    /* ── Centre: call screen ─────────────────── */
    .call-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .call-header {
      background: #ffffff;
      border-bottom: 1px solid #e6eaf4;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .call-status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #a6b0cb;
      flex-shrink: 0;
    }
    .call-status-dot.active { background: #4ade80; animation: pulse 1.4s infinite; }
    .call-status-dot.done   { background: #ef4444; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 #4ade8066; }
      50%      { box-shadow: 0 0 0 6px #4ade8000; }
    }
    .call-info { flex: 1; }
    .call-info .ci-main { font-size: 14px; font-weight: 600; }
    .call-info .ci-sub  { font-size: 11px; color: #7a859f; }

    /* ── Transcript ─────────────────────────── */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.bot  { align-items: flex-start; }
    .bubble-wrap.caller { align-items: flex-end; }
    .bubble-label { font-size: 10px; color: #475569; margin-bottom: 3px; padding: 0 4px; }
    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
    }
    .bubble.bot {
      background: #ffffff;
      border: 1px solid #e6eaf4;
      border-bottom-left-radius: 4px;
      color: #1f2a44;
    }
    .bubble.caller {
      background: linear-gradient(90deg, #4f6bff 0%, #7b3ff1 100%);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .bubble .action-tag {
      display: inline-block;
      font-size: 10px;
      background: #eef2ff;
      color: #4f6bff;
      border-radius: 4px;
      padding: 1px 6px;
      margin-bottom: 4px;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #334155;
    }
    .empty-state svg { width: 56px; height: 56px; opacity: .4; }
    .empty-state p { font-size: 14px; }

    /* ── Input bar ───────────────────────────── */
    .input-bar {
      border-top: 1px solid #e6eaf4;
      background: #ffffff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #caller-input {
      flex: 1;
      background: #ffffff;
      border: 1px solid #e6eaf4;
      color: #1f2a44;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    #caller-input:focus { border-color: #4f6bff; }
    #caller-input:disabled { opacity: .4; }
    #send-btn {
      background: #4f6bff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #send-btn:hover:not(:disabled) { background: #4158e8; }
    #send-btn:disabled { opacity: .4; cursor: default; }

    .quick-replies { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; padding: 0 20px; }
    .qr {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #e6eaf4;
      background: #f7f9ff;
      color: #6f7892;
      cursor: pointer;
      transition: all .12s;
    }
    .qr:hover { border-color: #4f6bff; color: #4f6bff; }

    /* ── Mic button ──────────────────────────── */
    #mic-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: #eef2ff;
      color: #7a859f;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    #mic-btn:hover:not(:disabled) { background: #dee5ff; color: #1f2a44; }
    #mic-btn.listening {
      background: #dc2626;
      color: #fff;
      animation: mic-pulse 1s infinite;
    }
    #mic-btn:disabled { opacity: .3; cursor: default; }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 #dc262666; }
      50%      { box-shadow: 0 0 0 8px #dc262600; }
    }
    .listening-indicator {
      font-size: 11px; color: #dc2626; font-style: italic;
      padding: 0 4px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d9dff1; border-radius: 4px; }
  </style>
</head>
<body>

<header class="top-header">
  <div class="logo">📊 VoiceSurvey AI</div>
  <nav class="nav-links">
    <a href="/" class="nav-link">בונה קמפיינים</a>
    <a href="/dashboard" class="nav-link">דשבורד</a>
    <a href="/voice" class="nav-link active" aria-current="page">שיחות לייב</a>
  </nav>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-label">חי</span>
    <span id="last-updated">סימולטור שיחות</span>
    <button id="voice-toggle" onclick="toggleVoice()" style="margin-left:8px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#ffffff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;">🔊 קול פעיל</button>
  </div>
</header>

<div class="app">

  <!-- LEFT: Setup + state -->
  <div class="setup-panel">
    <div class="panel-title">הגדרת שיחה</div>
    <div class="setup-body">
      <div>
        <label>קמפיין</label>
        <select id="campaign-select"><option value="">טוען...</option></select>
      </div>
      <div>
        <label>מספר טלפון</label>
        <input type="text" id="phone-input" value="+1-555-0100" />
      </div>
      <div>
        <label>לוקייל</label>
        <input type="text" id="locale-input" value="en-US" />
      </div>
      <button class="btn btn-primary" id="start-btn">▶ התחלת שיחה</button>
      <button class="btn btn-danger"  id="end-btn" disabled>⬛ סיום שיחה</button>
    </div>

    <div class="panel-title" style="margin-top:8px">מצב סשן</div>
    <div class="state-card" id="state-card" style="display:none">
      <div class="row"><span class="key">State</span><span class="val" id="s-state">—</span></div>
      <div class="row"><span class="key">Question</span><span class="val" id="s-question">—</span></div>
      <div class="row"><span class="key">Retries</span><span class="val" id="s-retries">0</span></div>
      <div class="row"><span class="key">Turns</span><span class="val" id="s-turns">0</span></div>
    </div>

    <div class="answers-box" id="answers-box" style="display:none">
      <div class="a-title">תשובות שנאספו</div>
      <div id="answers-list"></div>
    </div>
  </div>

  <!-- CENTRE: Transcript -->
  <div class="call-panel">
    <div class="call-header">
      <div class="call-status-dot" id="status-dot"></div>
      <div class="call-info">
        <div class="ci-main" id="ci-main">אין שיחה פעילה</div>
        <div class="ci-sub"  id="ci-sub">יש לבחור קמפיין וללחוץ על התחלת שיחה</div>
      </div>
    </div>

    <div id="transcript">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 18.5A6.5 6.5 0 1 0 5.5 12v.5A6.5 6.5 0 0 0 12 18.5z"/>
          <path d="M12 18.5v3M9 21.5h6"/>
        </svg>
        <p>התחל שיחה כדי לראות את Voice AI Pipeline בפעולה</p>
      </div>
    </div>

    <div class="quick-replies" id="quick-replies" style="display:none">
      <span class="qr" onclick="setInput('Can you repeat that?')">🔁 Repeat</span>
      <span class="qr" onclick="setInput('Can you rephrase that?')">💬 Rephrase</span>
      <span class="qr" onclick="setInput('Not now, call me back later')">🚫 Not Now</span>
      <span class="qr" onclick="setInput('Yes')">✅ Yes</span>
      <span class="qr" onclick="setInput('No')">❌ No</span>
      <span class="qr" onclick="setInput('Skip')">⏭ Skip</span>
    </div>

    <div class="input-bar">
      <button id="mic-btn" disabled title="Hold to speak">🎤</button>
      <input id="caller-input" type="text" placeholder="Speak or type your reply…" disabled />
      <span class="listening-indicator" id="listen-label" style="display:none">Listening…</span>
      <button id="send-btn" disabled>שליחה</button>
    </div>
  </div>

</div>

<script>
const API = '';   // same origin
let sessionId = null;
let campaignId = null;
let turnCount = 0;

// ── Web Speech API (browser TTS) ─────────────────────────────────────────────
const synth = window.speechSynthesis;
let voiceEnabled = true;
let selectedVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  // prefer English voices
  selectedVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                  voices.find(v => v.lang.startsWith('en')) ||
                  voices[0] || null;
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(text) {
  if (!voiceEnabled || !synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = selectedVoice;
  utt.rate  = 0.95;
  utt.pitch = 1.0;
  synth.speak(utt);
}

// ── Boot ────────────────────────────────────────────────────────────────────
async function loadCampaigns() {
  const res = await fetch(`${API}/api/campaigns`);
  const list = await res.json();
  const sel = document.getElementById('campaign-select');
  sel.innerHTML = '<option value="">— בחר —</option>';
  list.filter(c => c.status === 'active').forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = `${c.name} (${c.language})`;
    sel.appendChild(o);
  });
  if (!list.filter(c => c.status === 'active').length) {
    sel.innerHTML = '<option value="">אין קמפיינים פעילים</option>';
  }
}
loadCampaigns();

// ── Helpers ─────────────────────────────────────────────────────────────────
function setInput(text) {
  const inp = document.getElementById('caller-input');
  inp.value = text;
  inp.focus();
}

function fmt(ms) {
  if (ms === null || ms === undefined) return '—';
  return ms.toFixed(1) + ' ms';
}

function stateBadge(state) {
  const s = (state || 'unknown').split('.').pop().toLowerCase();
  return `<span class="badge badge-${s}">${s}</span>`;
}

function addBubble(role, text, actionTag) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;

  const label = document.createElement('div');
  label.className = 'bubble-label';
  label.textContent = role === 'bot' ? '🤖 AI Bot' : '🧑 Caller';
  wrap.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  if (actionTag) {
    bubble.innerHTML = `<div class="action-tag">${actionTag}</div><br>${text}`;
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(bubble);

  const t = document.getElementById('transcript');
  t.appendChild(wrap);
  t.scrollTop = t.scrollHeight;
}

// ── Web Speech Recognition (mic input) ───────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('listen-label').style.display = 'inline';
    document.getElementById('caller-input').value = '';
    document.getElementById('caller-input').placeholder = 'Listening…';
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    document.getElementById('caller-input').value = final || interim;
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('listen-label').style.display = 'none';
    document.getElementById('caller-input').placeholder = 'Speak or type your reply…';
    const text = document.getElementById('caller-input').value.trim();
    if (text) sendTurn();
  };

  recognition.onerror = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('listen-label').style.display = 'none';
    document.getElementById('caller-input').placeholder = 'Speak or type your reply…';
  };
}

document.getElementById('mic-btn').addEventListener('click', () => {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
  } else {
    recognition.lang = document.getElementById('locale-input').value || 'en-US';
    recognition.start();
  }
});

function updateState(data) {
  document.getElementById('s-state').innerHTML    = stateBadge(data.current_state || 'unknown');
  document.getElementById('s-question').textContent = data.current_question_key || '—';
  document.getElementById('s-retries').textContent  = '—';
  document.getElementById('s-turns').textContent    = turnCount;
  document.getElementById('state-card').style.display = 'block';
}

function updateAnswers(answers) {
  const box  = document.getElementById('answers-box');
  const list = document.getElementById('answers-list');
  if (!answers || !Object.keys(answers).length) return;
  list.innerHTML = Object.entries(answers).map(([k,v]) =>
    `<div class="answer-row"><span class="a-key">${k}</span><span class="a-val">${v}</span></div>`
  ).join('');
  box.style.display = 'block';
}

// ── Start call ───────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  const cid = document.getElementById('campaign-select').value;
  if (!cid) { alert('יש לבחור קמפיין פעיל.'); return; }

  campaignId = cid;
  turnCount = 0;

  document.getElementById('start-btn').disabled = true;
  document.getElementById('end-btn').disabled = false;
  document.getElementById('caller-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('quick-replies').style.display = 'flex';

  // clear transcript
  const t = document.getElementById('transcript');
  t.innerHTML = '';
  document.getElementById('answers-box').style.display = 'none';

  const dot = document.getElementById('status-dot');
  dot.className = 'call-status-dot active';
  document.getElementById('ci-main').textContent = `Call in progress — Campaign #${cid}`;
  document.getElementById('ci-sub').textContent  = document.getElementById('phone-input').value;

  try {
    const res = await fetch(`${API}/api/campaigns/${cid}/voice/sessions`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        participant_phone: document.getElementById('phone-input').value,
        locale: document.getElementById('locale-input').value,
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed to start session');

    sessionId = data.session_id;
    addBubble('bot', data.response_text, data.dialogue_action.replace(/_/g,' '));
    speak(data.response_text);
    updateState(data);
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('caller-input').focus();
  } catch (e) {
    alert('Error: ' + e.message);
    resetUI();
  }
});

// ── Send turn ────────────────────────────────────────────────────────────────
async function sendTurn() {
  const inp = document.getElementById('caller-input');
  const text = inp.value.trim();
  if (!text || !sessionId) return;

  inp.value = '';
  inp.disabled = true;
  document.getElementById('send-btn').disabled = true;

  turnCount++;
  addBubble('caller', text);

  try {
    const res = await fetch(`${API}/api/campaigns/${campaignId}/voice/sessions/${sessionId}/turn`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ transcript: text, audio_duration_ms: text.length * 60 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Turn failed');

    addBubble('bot', data.response_text, data.dialogue_action.replace(/_/g,' '));
    speak(data.response_text);
    updateState(data);

    // fetch full state for answers + retries
    const stRes = await fetch(`${API}/api/campaigns/${campaignId}/voice/sessions/${sessionId}`);
    if (stRes.ok) {
      const st = await stRes.json();
      updateAnswers(st.answers);
      document.getElementById('s-retries').textContent = st.retry_count ?? '—';
    }

    if (data.session_complete) {
      endCall(true);
      return;
    }
  } catch (e) {
    addBubble('bot', 'Error: ' + e.message);
  }

  inp.disabled = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

document.getElementById('send-btn').addEventListener('click', sendTurn);
document.getElementById('caller-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendTurn();
});

// ── End call ─────────────────────────────────────────────────────────────────
document.getElementById('end-btn').addEventListener('click', () => endCall(false));

async function endCall(completed) {
  if (sessionId) {
    try {
      await fetch(`${API}/api/campaigns/${campaignId}/voice/sessions/${sessionId}`, { method: 'DELETE' });
    } catch (_) {}
  }
  const dot = document.getElementById('status-dot');
  dot.className = 'call-status-dot done';
  document.getElementById('ci-main').textContent = completed ? '✅ Call completed' : '⬛ Call ended';
  document.getElementById('ci-sub').textContent  = `${turnCount} turn(s) · session ${(sessionId||'').slice(0,8)}…`;
  resetUI();
  sessionId = null;
}

function resetUI() {
  document.getElementById('start-btn').disabled = false;
  document.getElementById('end-btn').disabled = true;
  document.getElementById('caller-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('mic-btn').disabled = true;
  if (recognition && isListening) recognition.stop();
  synth.cancel();
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voice-toggle');
  btn.textContent = voiceEnabled ? '🔊 קול פעיל' : '🔇 קול כבוי';
  btn.style.color = voiceEnabled ? '#4ade80' : '#64748b';
  if (!voiceEnabled) synth.cancel();
}
</script>
</body>
</html>
